name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Restrict default GITHUB_TOKEN permissions to read-only for security hardening
permissions:
  contents: read

jobs:
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit Dependencies
        uses: actions-rust-lang/audit@v1

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    needs: security_audit  # Run audit first to fail fast on vulnerable dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build all targets
        run: cargo build --all-targets --locked

      - name: Run tests
        run: cargo test --all --locked

      - name: Build documentation
        run: cargo doc --no-deps --locked

      - name: Run Clippy
        run: cargo clippy --all-targets
        env:
          RUSTFLAGS: "-D warnings"

      # Smoke Tests
      - name: Run paper reproduction smoke test
        run: cargo run --quiet -- paper

      - name: Run C++ Clang frontend smoke test
        run: cargo run --quiet -- cpp examples/program1.cpp

      - name: Run implicit C++ frontend smoke test
        run: cargo run --quiet -- cpp-implicit examples/program1_plain.cpp

      - name: Run Figure 4 smoke test
        run: cargo run --quiet -- figure4

      - name: Run benchmark corpus CSV smoke test
        run: cargo run --quiet --release -- bench-corpus --csv > corpus.csv

      - name: Run C subset frontend smoke test
        run: cargo run --quiet -- c examples/program1.c

      - name: Run generic C analysis smoke test
        run: cargo run --quiet -- analyze-c examples/program1.c insert Act2 v Write

      - name: Run generic pseudo analysis smoke test
        run: cargo run --quiet -- analyze-pseudo examples/nested_split.pseudo insert Act1 x Write

      - name: Run generic C++ analysis smoke test
        run: cargo run --quiet -- analyze-cpp examples/program1.cpp insert Act2 v Write

      - name: Run JSON export smoke test
        run: cargo run --quiet -- export-json examples/program1.cpp > reproduction.json

      - name: Run paper JSON export smoke test
        run: cargo run --quiet -- export-paper-json examples/program1.cpp > reproduction-after-insertion.json

      - name: Run benchmark CSV smoke test
        run: cargo run --quiet --release -- bench-csv > benchmark.csv

  windows:
    name: Windows build and tests
    runs-on: windows-latest
    needs: security_audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install LLVM
        run: choco install llvm -y

      - name: Configure libclang
        shell: bash
        run: |
          echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $GITHUB_ENV

      - name: Build all targets
        run: cargo build --all-targets --locked

      # Test the full suite (with Clang) on Windows
      # Use --test-threads=1 to prevent race conditions during libclang loading in tests
      - name: Run tests (with Clang)
        run: cargo test --all --locked -- --test-threads=1

      # Fallback verification in case LLVM gets unlinked or has issues
      - name: Run pure Rust tests (no-default-features)
        run: cargo test --all --locked --no-default-features
