name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all --locked

      - name: Run paper reproduction smoke test
        run: cargo run --quiet -- paper

      - name: Run JSON export smoke test
        run: cargo run --quiet -- export-json examples/program1.pseudo > reproduction.json

      - name: Run benchmark CSV smoke test
        run: cargo run --quiet --release -- bench-csv > benchmark.csv
