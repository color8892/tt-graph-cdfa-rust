name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Restrict default GITHUB_TOKEN permissions to read-only for security hardening
permissions:
  contents: read

jobs:
  security_audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Audit Dependencies
        uses: actions-rust-lang/audit@v1

  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    needs: security_audit  # Run audit first to fail fast on vulnerable dependencies

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build all targets
        run: cargo build --all-targets --locked

      - name: Run tests
        run: cargo test --all --locked

      - name: Run core tests without default features
        run: cargo test --all --locked --no-default-features

      - name: Build documentation
        run: cargo doc --no-deps --locked

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Verify crate package
        run: cargo package --locked

      # Smoke Tests
      - name: Run paper reproduction smoke test
        run: cargo run --quiet -- paper
     
      - name: Run C++ Clang frontend smoke test
        run: cargo run --quiet -- cpp examples/paper_program1/program1.cpp

      - name: Run implicit C++ frontend smoke test
        run: cargo run --quiet -- cpp-implicit examples/paper_program1/program1_plain.cpp

      - name: Run diagnostics C++ smoke test
        run: cargo run --quiet -- diagnostics-cpp examples/paper_program1/program1.cpp

      - name: Run diagnostics C++ implicit smoke test
        run: cargo run --quiet -- diagnostics-cpp-implicit examples/paper_program1/program1_plain.cpp

      - name: Run Figure 4 smoke test
        run: cargo run --quiet -- figure4

      - name: Run benchmark corpus CSV smoke test
        run: cargo run --quiet --release -- bench-corpus --csv > corpus.csv


      - name: Run generic C++ analysis smoke test
        run: cargo run --quiet -- analyze-cpp examples/paper_program1/program1.cpp insert Act2 v Write

      - name: Run JSON export smoke test
        run: cargo run --quiet -- export-json examples/paper_program1/program1.cpp > reproduction.json

      - name: Run paper JSON export smoke test
        run: cargo run --quiet -- export-paper-json examples/paper_program1/program1.cpp > reproduction-after-insertion.json

      - name: Run benchmark CSV smoke test
        run: cargo run --quiet --release -- bench-csv > benchmark.csv

      - name: Run release build smoke test
        run: cargo build --release --locked

  vscode_extension:
    name: VS Code extension checks
    runs-on: ubuntu-latest
    needs: security_audit
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: TypeScript lint
        run: npm run lint

      - name: Run tests
        run: npm test

  windows:
    name: Windows build and tests
    runs-on: windows-latest
    needs: security_audit

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install LLVM
        run: choco install llvm -y

      - name: Configure libclang
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\LLVM\bin"
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=C:\Program Files\LLVM\bin"

      - name: Build all targets
        run: cargo build --all-targets --locked

      # Revert to pure Rust tests on Windows GHA to prevent flaky libclang.dll segmentation faults (exit code 0xc0000005)
      - name: Run pure Rust tests (no-default-features)
        run: cargo test --all --locked --no-default-features

  macos:
    name: macOS build and tests
    runs-on: macos-latest
    needs: security_audit

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install LLVM and Configure environment
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "SDKROOT=$(xcrun --sdk macosx --show-sdk-path)" >> $GITHUB_ENV
          STDARG_PATH=$(find $(brew --prefix llvm)/lib/clang -name stdarg.h | head -n 1)
          RESOURCE_DIR="${STDARG_PATH%/include/stdarg.h}"
          echo "CLANG_RESOURCE_DIR=$RESOURCE_DIR" >> $GITHUB_ENV
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1

      - name: Build all targets
        run: cargo build --all-targets --locked

      - name: Run tests
        run: cargo test --all --locked
