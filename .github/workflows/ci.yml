name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build all targets
        run: cargo build --all-targets --locked

      - name: Run tests
        run: cargo test --all --locked

      - name: Build documentation
        run: cargo doc --no-deps --locked

      - name: Run Clippy
        run: cargo clippy --all-targets
        env:
          RUSTFLAGS: "-D warnings"

      - name: Run paper reproduction smoke test
        run: cargo run --quiet -- paper

      - name: Run C++ Clang frontend smoke test
        run: cargo run --quiet -- cpp examples/program1.cpp

      - name: Run implicit C++ frontend smoke test
        run: cargo run --quiet -- cpp-implicit examples/program1_plain.cpp

      - name: Run Figure 4 smoke test
        run: cargo run --quiet -- figure4

      - name: Run benchmark corpus CSV smoke test
        run: cargo run --quiet --release -- bench-corpus --csv > corpus.csv

      - name: Run C subset frontend smoke test
        run: cargo run --quiet -- c examples/program1.c

      - name: Run generic C analysis smoke test
        run: cargo run --quiet -- analyze-c examples/program1.c insert Act2 v Write

      - name: Run generic pseudo analysis smoke test
        run: cargo run --quiet -- analyze-pseudo examples/nested_split.pseudo insert Act1 x Write

      - name: Run generic C++ analysis smoke test
        run: cargo run --quiet -- analyze-cpp examples/program1.cpp insert Act2 v Write

      - name: Run JSON export smoke test
        run: cargo run --quiet -- export-json examples/program1.cpp > reproduction.json

      - name: Run paper JSON export smoke test
        run: cargo run --quiet -- export-paper-json examples/program1.cpp > reproduction-after-insertion.json

      - name: Run benchmark CSV smoke test
        run: cargo run --quiet --release -- bench-csv > benchmark.csv

  windows:
    name: Windows build and tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          rustc --version
          cargo --version

      - name: Install LLVM
        run: choco install llvm -y

      - name: Configure libclang
        shell: pwsh
        run: |
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build all targets
        run: cargo build --all-targets --locked

      - name: Run tests
        run: cargo test --all --locked -- --test-threads=1
