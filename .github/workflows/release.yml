name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_crate:
        description: "Publish to crates.io after validation"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all --locked

      - name: Run no-default-features tests
        run: cargo test --all --locked --no-default-features

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Package crate
        run: cargo package --locked

      - name: Upload crate package artifact
        uses: actions/upload-artifact@v4
        with:
          name: crate-package
          path: target/package/*.crate

  github_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download crate package artifact
        uses: actions/download-artifact@v4
        with:
          name: crate-package
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.crate
          generate_release_notes: true

  crates_io_publish:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && inputs.publish_crate
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
